{% extends 'base.html' %}
{% block header %}
  <h2>Thyroid Cancer Prediction</h2>
  <p class="lead">Enter the values below to get an AI-based prediction.</p>
{% endblock %}
{% block content %}
  <form method="POST" class="form-grid">
    <div class="input-group">
      <label>Age</label>
      <input type="number" name="age" step="any" required>
    </div>
    <div class="input-group">
      <label>TSH (μIU/mL)</label>
      <input type="number" name="tsh" step="any" required>
    </div>
    <div class="input-group">
      <label>T3 (ng/dL)</label>
      <input type="number" name="t3" step="any" required>
    </div>
    <div class="input-group">
      <label>T4 (μg/dL)</label>
      <input type="number" name="t4" step="any" required>
    </div>
    <button type="submit" class="green-btn">🔍 Predict</button>
  </form>
  {% if result %}
    <p class="result">✅ {{ result }}</p>
  {% endif %}
  <div class="button-row">
    <a href="{{ url_for('dashboard') }}" class="secondary-btn">⬅ Back to Dashboard</a>
  </div>
{% endblock %}
